<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <script>
      // Single Page Apps for GitHub Pages
      // Redirect any path to index.html while preserving the path in query string
      // This allows React Router to handle the routing on the client side
      var path = window.location.pathname;
      var search = window.location.search;
      var hash = window.location.hash;
      
      // For root-level GitHub Pages (user/organization site), no base path
      // Build the redirect URL
      var redirectUrl = '/index.html';
      
      // Preserve the original path as a query parameter for React Router
      if (path && path !== '/') {
        // Remove leading slash for query param
        var queryPath = path.substring(1);
        redirectUrl += '?/' + queryPath;
      } else if (search) {
        redirectUrl += search;
      }
      
      // Preserve hash
      if (hash) {
        redirectUrl += hash;
      }
      
      window.location.href = redirectUrl;
    </script>
  </head>
  <body>
    Redirecting...
  </body>
</html>
