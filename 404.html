<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <script>
      // Single Page Apps for GitHub Pages
      // Redirect any path to index.html while preserving the path in query string
      // This allows React Router to handle the routing on the client side
      var path = window.location.pathname;
      var search = window.location.search;
      var hash = window.location.hash;
      
      // Get the repository base path (e.g., /website)
      var segments = path.split('/').filter(function(s) { return s.length > 0; });
      var basePath = '';
      if (segments.length > 0) {
        basePath = '/' + segments[0];
      }
      
      // Build the redirect URL
      var redirectUrl = basePath + '/index.html';
      
      // Preserve the original path after the base as a query parameter
      var pathAfterBase = path.substring(basePath.length);
      if (pathAfterBase && pathAfterBase !== '/') {
        // Remove leading slash for query param
        var queryPath = pathAfterBase.substring(1);
        redirectUrl += '?/' + queryPath;
      } else if (search) {
        redirectUrl += search;
      }
      
      // Preserve hash
      if (hash) {
        redirectUrl += hash;
      }
      
      window.location.href = redirectUrl;
    </script>
  </head>
  <body>
    Redirecting...
  </body>
</html>
